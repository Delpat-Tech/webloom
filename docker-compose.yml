version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: webloom_mongo
    ports:
      - "27017:27017"           # expose default MongoDB port
    volumes:
      - mongo-data:/data/db      # persist data between restarts
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    restart: unless-stopped

volumes:
  mongo-data: {}